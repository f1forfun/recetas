<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recetas</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="theme-color" content="#c96f4a">

  <style>
    :root {
      --bg: #f7f3ee;
      --surface: #ffffff;
      --text: #1f1b18;
      --muted: #756b64;
      --accent: #c96f4a;
      --border: rgba(0,0,0,.06);
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --radius-xl: 24px;
      --radius-lg: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .topbar {
      position: sticky;
      top: 0;
      background: #fff;
      padding: 16px;
      box-shadow: var(--shadow);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand img {
      width: 36px;
      height: 36px;
      border-radius: 10px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .search {
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    main {
      padding: 16px;
      max-width: 700px;
      margin: auto;
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 12px;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
    }

    .chip.active {
      background: var(--accent);
      color: #fff;
    }

    .card {
      background: #fff;
      border-radius: var(--radius-xl);
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card-body {
      padding: 14px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 14px;
      color: var(--muted);
    }

    .footer {
      margin-top: 10px;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      background: #f1e5df;
      border-radius: 999px;
      font-size: 12px;
      margin-right: 6px;
    }

    .hidden { display: none; }

    .back {
      margin-bottom: 12px;
      cursor: pointer;
      color: var(--accent);
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="brand">
    <img src="./icon-192.png">
    <h1>Recetas</h1>
  </div>

  <div class="search">
    <input id="searchInput" placeholder="Buscar recetas...">
  </div>
</header>

<main>

  <div id="chips" class="chips"></div>

  <div id="list"></div>

  <div id="detail" class="hidden"></div>

</main>

<script>

const API_URL = "https://dark-flower-6570.wordpressadri.workers.dev/";

let recetas = [];
let filtroCategoria = "";

function formatearFecha(fecha) {
  if (!fecha) return "";
  const d = new Date(fecha);
  return d.toLocaleDateString("es-ES");
}

function cargar() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {
      recetas = data;
      renderChips();
      render();
    });
}

function renderChips() {
  const chips = document.getElementById("chips");
  const categorias = [...new Set(recetas.map(r => r.categoria).filter(Boolean))];

  chips.innerHTML = "";

  const all = document.createElement("div");
  all.className = "chip active";
  all.innerText = "Todas";
  all.onclick = () => { filtroCategoria = ""; render(); };
  chips.appendChild(all);

  categorias.forEach(cat => {
    const el = document.createElement("div");
    el.className = "chip";
    el.innerText = cat;
    el.onclick = () => { filtroCategoria = cat; render(); };
    chips.appendChild(el);
  });
}

function render() {
  const list = document.getElementById("list");
  const texto = document.getElementById("searchInput").value.toLowerCase();

  list.innerHTML = "";

  recetas
    .filter(r =>
      (!filtroCategoria || r.categoria === filtroCategoria) &&
      (r.nombre.toLowerCase().includes(texto) ||
       r.descripcion.toLowerCase().includes(texto))
    )
    .forEach(r => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        ${r.imagen ? `<img src="${r.imagen}">` : ""}
        <div class="card-body">
          <div class="title">${r.nombre}</div>
          <div class="desc">${r.descripcion}</div>
          <div class="footer">
            ${r.categoria ? `<span class="pill">${r.categoria}</span>` : ""}
            ${r.fecha ? `<span class="pill">${formatearFecha(r.fecha)}</span>` : ""}
          </div>
        </div>
      `;

      div.onclick = () => detalle(r);

      list.appendChild(div);
    });
}

function detalle(r) {
  document.getElementById("list").classList.add("hidden");
  const d = document.getElementById("detail");

  d.innerHTML = `
    <div class="back" onclick="volver()">← Volver</div>

    ${r.imagen ? `<img src="${r.imagen}" style="width:100%">` : ""}

    <h2>${r.nombre}</h2>
    <p>${r.descripcion}</p>

    <div>
      ${r.categoria ? `<span class="pill">${r.categoria}</span>` : ""}
      ${r.fecha ? `<span class="pill">${formatearFecha(r.fecha)}</span>` : ""}
    </div>

    <h3>Ingredientes</h3>
    <ul>${r.ingredientes.split("\n").map(i => `<li>${i}</li>`).join("")}</ul>

    <h3>Pasos</h3>
    <ol>${r.pasos.split("\n").map(p => `<li>${p}</li>`).join("")}</ol>
  `;

  d.classList.remove("hidden");
}

function volver() {
  document.getElementById("detail").classList.add("hidden");
  document.getElementById("list").classList.remove("hidden");
}

document.getElementById("searchInput").oninput = render;

cargar();

</script>

</body>
</html>
