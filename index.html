<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recetas</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="theme-color" content="#8e6a5a">

  <style>
    :root {
      --bg: #f5f1ec;
      --bg-soft: #fcfaf8;
      --surface: rgba(255,255,255,0.92);
      --surface-strong: #ffffff;
      --text: #221d1a;
      --muted: #786d65;
      --accent: #8e6a5a;
      --accent-2: #b78766;
      --accent-soft: #efe3da;
      --success: #2f7d57;
      --danger: #b14f45;
      --border: rgba(68, 47, 35, 0.08);
      --shadow-soft: 0 10px 30px rgba(48, 32, 24, 0.08);
      --shadow-card: 0 18px 45px rgba(48, 32, 24, 0.10);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --max-width: 820px;
      --ease: 240ms cubic-bezier(.2,.8,.2,1);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, var(--bg-soft) 0%, var(--bg) 42%, #efe7e0 100%);
    }

    img {
      display: block;
      max-width: 100%;
    }

    button,
    input,
    textarea,
    select,
    a {
      font: inherit;
    }

    .app-shell {
      max-width: var(--max-width);
      margin: 0 auto;
      padding-bottom: 34px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      padding: 14px 14px 10px;
      background: linear-gradient(
        to bottom,
        rgba(245,241,236,0.96) 0%,
        rgba(245,241,236,0.90) 70%,
        rgba(245,241,236,0.35) 100%
      );
      backdrop-filter: blur(8px);
    }

    .topbar-inner {
      padding: 12px 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: var(--shadow-soft);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      object-fit: cover;
      background: #fff;
      border: 1px solid var(--border);
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      flex-shrink: 0;
    }

    .brand-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand-tagline {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
    }

    .brand-title {
      margin: 0;
      font-size: 22px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .brand-subtitle {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--muted);
      opacity: 1;
      transform: translateY(0);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    
    .icon-button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.92);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: transform var(--ease), background var(--ease), color var(--ease);
      flex-shrink: 0;
    }

    .icon-button:active {
      transform: scale(.96);
    }

    .icon-button.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
    }

    .recipes-header {
      margin-top: 10px;
    }

    .search-panel {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transform: translateY(-6px);
      margin-top: 0;
      pointer-events: none;
      transition:
        max-height 320ms cubic-bezier(.2,.8,.2,1),
        opacity 220ms ease,
        transform 220ms ease,
        margin-top 220ms ease;
    }

    .search-panel.open {
      max-height: 100px;
      opacity: 1;
      transform: translateY(0);
      margin-top: 14px;
      pointer-events: auto;
    }

    .search-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.96);
      color: var(--text);
      border-radius: 18px;
      padding: 14px 48px 14px 44px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), var(--shadow-soft);
      transition: border-color var(--ease), box-shadow var(--ease);
    }

    .search-input:focus,
    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      border-color: rgba(142,106,90,0.32);
      box-shadow: 0 0 0 5px rgba(142,106,90,0.10), var(--shadow-soft);
      outline: none;
    }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--muted);
    }

    .search-close {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .content {
      padding: 10px 14px 14px;
    }

    .intro-card {
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.92),
        rgba(255,255,255,0.78)
      );
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: var(--shadow-card);
      border-radius: 28px;
      padding: 20px 18px;
      margin-bottom: 18px;
    }

    .intro-copy {
      display: grid;
      gap: 8px;
    }

    .intro-eyebrow {
      margin: 0;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .intro-title {
      margin: 0;
      font-size: 26px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .intro-text {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: #4d433d;
    }

    .intro-count {
      margin: 4px 0 0;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .section-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin: 10px 4px 14px;
    }

    .section-title {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .section-meta {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .chips {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 2px 2px 8px;
      margin-bottom: 16px;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar {
      display: none;
    }

    .chip {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.92);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: transform var(--ease), background var(--ease), color var(--ease), border-color var(--ease);
    }

    .chip:active {
      transform: scale(.98);
    }

    .chip.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
    }

    .featured-section {
      margin-bottom: 22px;
      padding-bottom: 6px;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      border-radius: 0 !important;
    }

    .featured-header {
      margin: 0 4px 12px;
      padding: 0;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      border-radius: 0 !important;
    }

    .featured-track {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 85%;
      gap: 14px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 4px 2px 10px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      background: transparent;
      border: none;
      box-shadow: none;
      border-radius: 0;
    }

    .featured-track::-webkit-scrollbar {
      display: none;
    }

    .featured-shell {
      margin: 0 -14px;
      padding: 6px 14px 12px;
      overflow: hidden;
      background: transparent;
    }

    .featured-card {
      position: relative;
      overflow: hidden;
      border-radius: 26px;
      background: var(--surface-strong);
      box-shadow: var(--shadow-card);
      scroll-snap-align: start;
      cursor: pointer;
    }

    .featured-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .featured-card-body {
      padding: 16px;
    }

    .featured-card-title {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .featured-card-description {
      margin: 0 0 12px;
      color: #4d433d;
      font-size: 14px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    #listSection {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      border-radius: 0 !important;
    }

    .list-view {
      display: grid;
      gap: 14px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      background: var(--surface-strong);
      box-shadow: var(--shadow-card);
      cursor: pointer;
      transition:
        transform var(--ease),
        box-shadow var(--ease),
        opacity 220ms ease;
      animation: cardIn 360ms cubic-bezier(.2,.8,.2,1);
    }

    .card:active {
      transform: scale(.992);
    }

    .card-image-wrap {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #eadfd6, #e2d3c8);
    }

    .card img {
      width: 100%;
      height: 165px;
      object-fit: cover;
      transition: transform 500ms ease;
    }

    .card:hover img {
      transform: scale(1.03);
    }

    .card-category {
      position: absolute;
      top: 14px;
      left: 14px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.94);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      backdrop-filter: blur(8px);
    }

    .card-body {
      padding: 12px 12px 14px;
    }

    .card-title {
      margin: 0 0 6px;
      font-size: 17px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .card-description {
      margin: 0 0 10px;
      color: #4d433d;
      font-size: 13px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer,
    .hero-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      margin-bottom: 6px;
    }

    .card-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 3;

      padding: 7px 11px;
      border-radius: 999px;

      font-size: 11px;
      font-weight: 800;
      line-height: 1;

      background: rgba(142,106,90,0.92);
      color: #fff;

      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      backdrop-filter: blur(8px);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 11px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }

    .state {
      padding: 32px 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.55);
      border-radius: 22px;
      box-shadow: var(--shadow-soft);
    }

    .hidden {
      display: none !important;
    }

    .detail-view {
      animation: detailEnter 280ms cubic-bezier(.2,.8,.2,1);
    }

    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.92);
      color: var(--accent);
      border-radius: 999px;
      padding: 11px 15px;
      font-weight: 800;
      box-shadow: var(--shadow-soft);
      margin: 6px 0 16px;
      cursor: pointer;
    }

    .hero-card {
      overflow: hidden;
      border-radius: 30px;
      background: var(--surface-strong);
      box-shadow: var(--shadow-card);
      margin-bottom: 16px;
    }

    .hero-image {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      background: linear-gradient(180deg, #eadfd6, #e2d3c8);
    }

    .hero-content {
      padding: 20px;
    }

    .hero-title {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .hero-description {
      margin: 0;
      color: #4d433d;
      font-size: 15px;
      line-height: 1.65;
    }

    .video-button,
    .primary-button, 
    .secondary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      border-radius: 16px;
      padding: 12px 16px;
      text-decoration: none;
      cursor: pointer;
      border: 0;
      font-weight: 700;
      transition: transform var(--ease), opacity var(--ease), box-shadow var(--ease);
    }

    .video-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;

      margin-top: 12px;

      padding: 10px 14px;
      border-radius: 999px;

      background: linear-gradient(
        135deg,
        var(--accent),
        var(--accent-2)
      );

      color: #fff;
      font-weight: 700;
      font-size: 13px;

      text-decoration: none;

      box-shadow: 0 6px 14px rgba(0,0,0,0.12);

      transition: all var(--ease);
    }
    .primary-button {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      box-shadow: var(--shadow-soft);
    }

    .secondary-button {
      background: rgba(255,255,255,0.95);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
    }

    .logout-button {
      background: rgba(177,79,69,0.12);
      color: var(--danger);
      border: 1px solid rgba(177,79,69,0.22);
    }

    .logout-button:hover {
      background: rgba(177,79,69,0.18);
    }

    .video-button:active {
      transform: scale(0.96);
      box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    }
    .primary-button:active,
    .secondary-button:active {
      transform: scale(.98);
    }

    .detail-grid {
      display: grid;
      gap: 14px;
    }

    .detail-section,
    .admin-card {
      background: rgba(255,255,255,0.94);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow-card);
    }

    .detail-section h3,
    .admin-card h3 {
      margin: 0 0 14px;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .detail-list {
      margin: 0;
      padding-left: 20px;
      line-height: 1.75;
      color: #403833;
    }

    .detail-list li + li {
      margin-top: 6px;
    }

    .detail-empty {
      margin: 0;
      color: var(--muted);
    }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(34, 29, 26, 0.22);
      backdrop-filter: blur(2px);
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    .drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(86vw, 360px);
      height: 100vh;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(14px);
      box-shadow: -12px 0 30px rgba(0,0,0,0.10);
      z-index: 90;
      transform: translateX(100%);
      opacity: 0.98;
      transition:
        transform 280ms cubic-bezier(.2,.8,.2,1),
        opacity 220ms ease;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .drawer.open {
      transform: translateX(0);
      opacity: 1;
    }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .drawer-title {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .drawer-close {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
    }

    .drawer-menu {
      display: grid;
      gap: 10px;
    }

    .menu-item {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      font-weight: 700;
    }

    .admin-view {
      animation: fadeSlideIn 320ms cubic-bezier(.2,.8,.2,1);
    }

    .admin-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .admin-title {
      margin: 0;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .admin-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.96);
      color: var(--text);
      border-radius: 16px;
      padding: 13px 14px;
      box-shadow: var(--shadow-soft);
    }

    .form-textarea {
      min-height: 110px;
      resize: vertical;
    }

    .form-row {
      display: grid;
      gap: 12px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 4px;
    }

    .admin-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    .status-message {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .status-success {
      background: rgba(47,125,87,0.12);
      color: var(--success);
    }

    .status-error {
      background: rgba(177,79,69,0.12);
      color: var(--danger);
    }

    @keyframes detailEnter {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (min-width: 720px) {
      .list-view {
        grid-template-columns: 1fr 1fr;
      }

      .featured-track {
        grid-auto-columns: 48%;
      }

      .form-row.two {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-row">
          <div class="brand-left">
            <img class="brand-icon" src="./icon-192.png" alt="Icono Recetas">
            <div class="brand-copy">
              <h1 class="brand-title">Recetas</h1>
              <p class="brand-tagline">Ideas rápidas para comer sano</p>
            </div>
          </div>

          <div class="topbar-actions">
            <button id="searchToggle" class="icon-button" aria-label="Abrir búsqueda">🔍</button>
            <button id="menuToggle" class="icon-button" aria-label="Abrir menú">☰</button>
          </div>
        </div>

        <div id="searchPanel" class="search-panel">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input
              id="searchInput"
              class="search-input"
              type="text"
              placeholder="Buscar por nombre, ingredientes o descripción"
            >
            <button id="searchClose" class="search-close" aria-label="Cerrar búsqueda">✕</button>
          </div>
        </div>
      </div>
    </header>

    <main class="content">
      <section id="listSection">
        <div id="categoryChips" class="chips hidden"></div>

        <section id="featuredSection" class="featured-section hidden">
          <div class="section-header featured-header">
            <div>
              <h2 class="section-title">Destacadas para ti</h2>
              <p class="section-meta">3 ideas aleatorias cada vez que entras</p>
            </div>
          </div>

          <div class="featured-shell">
            <div id="featuredTrack" class="featured-track"></div>
          </div>
        </section>

        <div class="section-header recipes-header">
          <div>
            <h2 class="section-title">Todas las recetas</h2>
            <p id="sectionMeta" class="section-meta">Cargando...</p>
          </div>
        </div>

        <div id="loading" class="state">Cargando recetas...</div>
        <div id="error" class="state hidden">No se pudieron cargar las recetas.</div>
        <div id="listView" class="list-view hidden"></div>

      <section id="detailView" class="detail-view hidden"></section>

      <section id="adminView" class="admin-view hidden">
        <div class="admin-header">
          <div>
            <h2 class="admin-title">Gestionar recetas</h2>
            <p class="admin-subtitle">Acceso privado para añadir nuevas recetas</p>

        </div>

        <div id="adminLoginCard" class="admin-card">
          <h3>Acceso</h3>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label" for="adminUsername">Usuario</label>
              <input id="adminUsername" class="form-input" type="text" placeholder="">
            </div>

            <div class="form-group">
              <label class="form-label" for="adminPassword">Contraseña</label>
              <input id="adminPassword" class="form-input" type="password" placeholder="">
            </div>

            <div class="admin-actions">
              <button id="adminLoginButton" class="primary-button">Entrar</button>
              <button id="adminBackButton1" class="secondary-button">Volver</button>
            </div>

            <div id="adminLoginMessage"></div>
          </div>
        </div>

        <div id="adminFormCard" class="admin-card hidden">
          <h3>Nueva receta</h3>

          <div class="form-grid">
            <div class="form-group">
              <label class="form-label" for="recipeNombre">Nombre</label>
              <input id="recipeNombre" class="form-input" type="text" placeholder="Ej. Lasaña casera">
            </div>

            <div class="form-group">
              <label class="form-label" for="recipeDescripcion">Descripción</label>
              <textarea id="recipeDescripcion" class="form-textarea" placeholder="Describe la receta brevemente"></textarea>
            </div>

            <div class="form-row two">
              <div class="form-group">
                <label class="form-label" for="recipeCategoria">Categoría</label>
                <input id="recipeCategoria" class="form-input" type="text" placeholder="Ej. Comida">
              </div>

              <div class="form-group">
                <label class="form-label" for="recipeFecha">Fecha</label>
                <input id="recipeFecha" class="form-input" type="date">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="recipeIngredientes">Ingredientes</label>
              <textarea id="recipeIngredientes" class="form-textarea" placeholder="Uno por línea"></textarea>
            </div>

            <div class="form-group">
              <label class="form-label" for="recipePasos">Pasos</label>
              <textarea id="recipePasos" class="form-textarea" placeholder="Uno por línea"></textarea>
            </div>

            <div class="form-group">
              <label class="form-label" for="recipeLink">Link de vídeo</label>
              <input id="recipeLink" class="form-input" type="url" placeholder="https://www.tiktok.com/...">
            </div>

            <div class="form-group">
              <label class="form-label" for="recipeImagen">Imagen (URL)</label>
              <input id="recipeImagen" class="form-input" type="url" placeholder="https://...">
            </div>

            <label class="checkbox-row">
              <input id="recipeVisible" type="checkbox" checked>
              <span>Visible en la app</span>
            </label>

            <div class="admin-actions">
              <button id="saveRecipeButton" class="primary-button">Guardar receta</button>
              <button id="logoutAdminButton" class="secondary-button logout-button">Cerrar sesión</button>
              <button id="adminBackButton2" class="secondary-button">Volver</button>
            </div>

            <div id="adminFormMessage"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="drawerOverlay" class="drawer-overlay"></div>

  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-header">
      <h3 class="drawer-title">Menú</h3>
      <button id="drawerClose" class="drawer-close" aria-label="Cerrar menú">✕</button>
    </div>

    <div class="drawer-menu">
      <button id="menuHome" class="menu-item">Inicio</button>
      <button id="menuAdmin" class="menu-item">Gestionar recetas</button>
    </div>
  </aside>

  <script>
    const API_BASE = "https://dark-flower-6570.wordpressadri.workers.dev".replace(/\/+$/, "");

    function getRecipesUrl() {
      return `${API_BASE}/`;
    }

    function getLoginUrl() {
      return `${API_BASE}/login`;
    }

    function getCreateRecipeUrl() {
      return `${API_BASE}/create-recipe`;
    }

    let recetas = [];
    let recetasFiltradas = [];
    let categoriaActiva = "";
    let busquedaAbierta = false;

    const loadingEl = document.getElementById("loading");
    const errorEl = document.getElementById("error");
    const listView = document.getElementById("listView");
    const detailView = document.getElementById("detailView");
    const adminView = document.getElementById("adminView");
    const searchInput = document.getElementById("searchInput");
    const searchPanel = document.getElementById("searchPanel");
    const searchToggle = document.getElementById("searchToggle");
    const searchClose = document.getElementById("searchClose");
    const menuToggle = document.getElementById("menuToggle");
    const drawer = document.getElementById("drawer");
    const drawerOverlay = document.getElementById("drawerOverlay");
    const drawerClose = document.getElementById("drawerClose");
    const categoryChips = document.getElementById("categoryChips");
    const listSection = document.getElementById("listSection");
    const sectionMeta = document.getElementById("sectionMeta");
    const featuredSection = document.getElementById("featuredSection");
    const featuredTrack = document.getElementById("featuredTrack");

    const adminLoginCard = document.getElementById("adminLoginCard");
    const adminFormCard = document.getElementById("adminFormCard");
    const adminUsername = document.getElementById("adminUsername");
    const adminPassword = document.getElementById("adminPassword");
    const adminLoginButton = document.getElementById("adminLoginButton");
    const adminLoginMessage = document.getElementById("adminLoginMessage");
    const adminBackButton1 = document.getElementById("adminBackButton1");
    const adminBackButton2 = document.getElementById("adminBackButton2");
    const logoutAdminButton = document.getElementById("logoutAdminButton");
    const saveRecipeButton = document.getElementById("saveRecipeButton");
    const adminFormMessage = document.getElementById("adminFormMessage");

    const recipeNombre = document.getElementById("recipeNombre");
    const recipeDescripcion = document.getElementById("recipeDescripcion");
    const recipeCategoria = document.getElementById("recipeCategoria");
    const recipeFecha = document.getElementById("recipeFecha");
    const recipeIngredientes = document.getElementById("recipeIngredientes");
    const recipePasos = document.getElementById("recipePasos");
    const recipeLink = document.getElementById("recipeLink");
    const recipeImagen = document.getElementById("recipeImagen");
    const recipeVisible = document.getElementById("recipeVisible");

    async function cargarRecetas() {
      try {
        const response = await fetch(getRecipesUrl());
        if (!response.ok) throw new Error("No se pudieron cargar las recetas");

        recetas = await response.json();
        recetasFiltradas = [...recetas];

        renderCategorias();
        aplicarFiltros();

        loadingEl.classList.add("hidden");
        listView.classList.remove("hidden");

        restaurarEstadoDesdeURL();
      } catch (error) {
        console.error("ERROR cargarRecetas:", error);
        loadingEl.classList.add("hidden");
        errorEl.classList.remove("hidden");
        errorEl.textContent = "No se pudieron cargar las recetas.";
      }
    }

    function abrirBuscador() {
      busquedaAbierta = true;
      searchPanel.classList.add("open");
      searchToggle.classList.add("active");
      setTimeout(() => searchInput.focus(), 180);
    }

    function cerrarBuscador(limpiar = false) {
      if (limpiar) {
        searchInput.value = "";
        aplicarFiltros();
      }
      busquedaAbierta = false;
      searchPanel.classList.remove("open");
      searchToggle.classList.remove("active");
      searchInput.blur();
    }

    function toggleBuscador() {
      if (busquedaAbierta) cerrarBuscador(false);
      else abrirBuscador();
    }

    function abrirDrawer() {
      drawer.classList.add("open");
      drawerOverlay.classList.add("open");
    }

    function cerrarDrawer() {
      drawer.classList.remove("open");
      drawerOverlay.classList.remove("open");
    }

    function normalizarTexto(texto) {
      return (texto || "").toLowerCase().trim();
    }

    function convertirTextoEnLista(texto) {
      return (texto || "")
        .split("\n")
        .map(item => item.trim())
        .filter(Boolean);
    }

    function truncarTexto(texto, max = 120) {
      if (!texto) return "";
      return texto.length > max ? texto.slice(0, max).trim() + "…" : texto;
    }

    function mezclarArray(array) {
      const copia = [...array];
      for (let i = copia.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copia[i], copia[j]] = [copia[j], copia[i]];
      }
      return copia;
    }

    function formatearFecha(fecha) {
      if (!fecha) return "";
      const date = new Date(fecha);
      if (isNaN(date.getTime())) return fecha;
      return date.toLocaleDateString("es-ES", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });
    }

    function escapeHtml(text) {
      return (text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderCategorias() {
      const categorias = [...new Set(recetas.map(r => r.categoria).filter(Boolean))];

      if (!categorias.length) {
        categoryChips.classList.add("hidden");
        return;
      }

      categoryChips.innerHTML = "";

      const chipTodas = crearChip("Todas", "");
      categoryChips.appendChild(chipTodas);

      categorias.forEach(categoria => {
        categoryChips.appendChild(crearChip(categoria, categoria));
      });

      categoryChips.classList.remove("hidden");
      actualizarChips();
    }

    function crearChip(texto, valor) {
      const button = document.createElement("button");
      button.className = "chip";
      button.textContent = texto;
      button.dataset.value = valor;
      button.addEventListener("click", () => {
        categoriaActiva = valor;
        actualizarChips();
        aplicarFiltros();
      });
      return button;
    }

    function actualizarChips() {
      const chips = categoryChips.querySelectorAll(".chip");
      chips.forEach(chip => {
        chip.classList.toggle("active", chip.dataset.value === categoriaActiva);
      });
    }

    function aplicarFiltros() {
      const texto = normalizarTexto(searchInput.value);

      recetasFiltradas = recetas.filter(receta => {
        const coincideTexto =
          normalizarTexto(receta.nombre).includes(texto) ||
          normalizarTexto(receta.descripcion).includes(texto) ||
          normalizarTexto(receta.ingredientes).includes(texto);

        const coincideCategoria =
          !categoriaActiva || receta.categoria === categoriaActiva;

        return coincideTexto && coincideCategoria;
      });

      sectionMeta.textContent = `${recetasFiltradas.length} receta${recetasFiltradas.length === 1 ? "" : "s"}`;
      const totalTexto = `${recetasFiltradas.length} receta${recetasFiltradas.length === 1 ? "" : "s"}`;
      sectionMeta.textContent = totalTexto;
      renderDestacadas();
      renderLista();
    }

    function renderDestacadas() {
      featuredTrack.innerHTML = "";

      if (!recetasFiltradas.length) {
        featuredSection.classList.add("hidden");
        return;
      }

      const destacadas = mezclarArray(recetasFiltradas).slice(0, 3);

      destacadas.forEach(receta => {
        const article = document.createElement("article");
        article.className = "featured-card";

        article.innerHTML = `
          ${receta.imagen ? `<img src="${receta.imagen}" alt="${escapeHtml(receta.nombre || "Receta")}">` : ""}
          ${receta.link ? `<span class="card-badge">🎬 Vídeo</span>` : ""}
          ${receta.categoria ? `<div class="card-category">${escapeHtml(receta.categoria)}</div>` : ""}
          <div class="featured-card-body">
            <h3 class="featured-card-title">${escapeHtml(receta.nombre || "Sin nombre")}</h3>
            <p class="featured-card-description">${escapeHtml(truncarTexto(receta.descripcion || "", 100))}</p>
            <div class="card-footer">
              ${receta.categoria ? `<span class="pill">🍴 ${escapeHtml(receta.categoria)}</span>` : ""}
              ${receta.fecha ? `<span class="pill">📅 ${escapeHtml(formatearFecha(receta.fecha))}</span>` : ""}
            </div>
          </div>
        `;

        article.addEventListener("click", () => abrirReceta(receta, true));
        featuredTrack.appendChild(article);
      });

      featuredSection.classList.remove("hidden");
    }
    
    function renderLista() {
      listView.innerHTML = "";

      if (!recetasFiltradas.length) {
        featuredSection.classList.add("hidden");
        listView.innerHTML = `<div class="state">No hay recetas que coincidan con tu búsqueda.</div>`;
        return;
      }
      

      const recetasOrdenadas = mezclarArray(recetasFiltradas);

      recetasOrdenadas.forEach(receta => {
        const article = document.createElement("article");
        article.className = "card";

        article.innerHTML = `
          <div class="card-image-wrap">
            ${receta.imagen ? `<img src="${receta.imagen}" alt="${escapeHtml(receta.nombre || "Receta")}">` : ""}
            ${receta.link ? `<span class="card-badge">🎬 Vídeo</span>` : ""}
            ${receta.categoria ? `<div class="card-category">${escapeHtml(receta.categoria)}</div>` : ""}
          </div>
          <div class="card-body">
            <h3 class="card-title">${escapeHtml(receta.nombre || "Sin nombre")}</h3>
            <p class="card-description">${escapeHtml(truncarTexto(receta.descripcion || ""))}</p>
            <div class="card-footer">
              ${receta.categoria ? `<span class="pill">🍴 ${escapeHtml(receta.categoria)}</span>` : ""}
              ${receta.fecha ? `<span class="pill">📅 ${escapeHtml(formatearFecha(receta.fecha))}</span>` : ""}
            </div>
          </div>
        `;

        article.addEventListener("click", () => abrirReceta(receta, true));
        listView.appendChild(article);
      });
    }

    function abrirReceta(receta, pushState = true) {
      const ingredientes = convertirTextoEnLista(receta.ingredientes);
      const pasos = convertirTextoEnLista(receta.pasos);

      detailView.innerHTML = `
        <button class="detail-back" id="backButton">← Volver</button>

        <article class="hero-card">
          ${receta.imagen ? `<img class="hero-image" src="${receta.imagen}" alt="${escapeHtml(receta.nombre || "Receta")}">` : ""}
          <div class="hero-content">
            <h2 class="hero-title">${escapeHtml(receta.nombre || "Sin nombre")}</h2>
            <p class="hero-description">${escapeHtml(receta.descripcion || "")}</p>
            <div class="hero-pills">
              ${receta.categoria ? `<span class="pill">🍴 ${escapeHtml(receta.categoria)}</span>` : ""}
              ${receta.fecha ? `<span class="pill">📅 ${escapeHtml(formatearFecha(receta.fecha))}</span>` : ""}
            </div>
            ${receta.link ? `<a class="video-button" href="${escapeHtml(receta.link)}" target="_blank" rel="noopener noreferrer">🎬 Ver vídeo</a>` : ""}
          </div>
        </article>

        <div class="detail-grid">
          <section class="detail-section">
            <h3>Ingredientes</h3>
            ${
              ingredientes.length
                ? `<ul class="detail-list">${ingredientes.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`
                : `<p class="detail-empty">No hay ingredientes.</p>`
            }
          </section>

          <section class="detail-section">
            <h3>Pasos</h3>
            ${
              pasos.length
                ? `<ol class="detail-list">${pasos.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ol>`
                : `<p class="detail-empty">No hay pasos.</p>`
            }
          </section>
        </div>
      `;

      document.getElementById("backButton").addEventListener("click", () => {
        history.back();
      });

      ocultarTodo();
      detailView.classList.remove("hidden");
      cerrarDrawer();
      window.scrollTo({ top: 0, behavior: "smooth" });

      if (pushState) {
        const url = new URL(window.location.href);
        url.hash = `receta=${receta.id}`;
        history.pushState({ view: "detail", recetaId: receta.id }, "", url);
      }
    }

    function mostrarAdmin(pushState = true) {
      ocultarTodo();
      adminView.classList.remove("hidden");
      prepararEstadoAdmin();
      cerrarDrawer();

      window.scrollTo({ top: 0, behavior: "smooth" });

      if (pushState) {
        const url = new URL(window.location.href);
        url.hash = "admin";
        history.pushState({ view: "admin" }, "", url);
      }
    }

    function prepararEstadoAdmin() {
      const token = getAdminToken();

      limpiarMensaje(adminLoginMessage);
      limpiarMensaje(adminFormMessage);

      if (token) {
        adminLoginCard.classList.add("hidden");
        adminFormCard.classList.remove("hidden");
      } else {
        adminLoginCard.classList.remove("hidden");
        adminFormCard.classList.add("hidden");
      }
    }

    function volverALista(fromPopState = false) {
      ocultarTodo();
      listSection.classList.remove("hidden");
      cerrarDrawer();

      window.scrollTo({ top: 0, behavior: "smooth" });

      if (!fromPopState) {
        const cleanUrl = window.location.pathname + window.location.search;
        history.replaceState({ view: "list" }, "", cleanUrl);
      }
    }

    function irArriba() {
      window.scrollTo({
        top: 0,
        behavior: "instant"
      });
    }

    function ocultarTodo() {
      listSection.classList.add("hidden");
      detailView.classList.add("hidden");
      adminView.classList.add("hidden");
    }

    function mostrarInicio(pushState = false) {
      ocultarTodo();
      listSection.classList.remove("hidden");
      cerrarDrawer();

      window.scrollTo({ top: 0, behavior: "smooth" });

      const cleanUrl = window.location.pathname + window.location.search;

      if (pushState) {
        history.pushState({ view: "list" }, "", cleanUrl);
      } else {
        history.replaceState({ view: "list" }, "", cleanUrl);
      }
    }

    function restaurarEstadoDesdeURL() {
      const hash = window.location.hash || "";

      if (hash === "#admin") {
        history.replaceState({ view: "admin" }, "", window.location.href);
        mostrarAdmin(false);
        return;
      }

      if (hash.startsWith("#receta=")) {
        const recetaId = hash.replace("#receta=", "");
        const receta = recetas.find(r => r.id === recetaId);

        if (receta) {
          history.replaceState({ view: "detail", recetaId }, "", window.location.href);
          abrirReceta(receta, false);
          return;
        }
      }

      mostrarInicio(false);
    }

    window.addEventListener("popstate", (event) => {
      const state = event.state;

      if (!state || state.view === "list") {
        volverALista(true);
        return;
      }

      if (state.view === "admin") {
        mostrarAdmin(false);
        return;
      }

      if (state.view === "detail" && state.recetaId) {
        const receta = recetas.find(r => r.id === state.recetaId);
        if (receta) {
          abrirReceta(receta, false);
          return;
        }
      }

      volverALista(true);
    });

    function setAdminToken(token) {
      localStorage.setItem("admin_token", token);
    }

    function getAdminToken() {
      return localStorage.getItem("admin_token") || "";
    }

    function clearAdminToken() {
      localStorage.removeItem("admin_token");
    }

    function mostrarMensaje(element, texto, tipo) {
      element.innerHTML = `<div class="status-message ${tipo === "error" ? "status-error" : "status-success"}">${escapeHtml(texto)}</div>`;
    }

    function limpiarMensaje(element) {
      element.innerHTML = "";
    }

    async function loginAdmin() {
      limpiarMensaje(adminLoginMessage);

      const username = adminUsername.value.trim();
      const password = adminPassword.value;

      if (!username || !password) {
        mostrarMensaje(adminLoginMessage, "Introduce usuario y contraseña.", "error");
        return;
      }

      try {
        const response = await fetch(getLoginUrl(), {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          mostrarMensaje(adminLoginMessage, data.error || "No se pudo iniciar sesión.", "error");
          return;
        }

        setAdminToken(data.token);
        adminPassword.value = "";
        mostrarMensaje(adminLoginMessage, "Acceso correcto.", "success");

        setTimeout(() => {
          limpiarMensaje(adminLoginMessage);
          prepararEstadoAdmin();
        }, 500);
      } catch (error) {
        console.error(error);
        mostrarMensaje(adminLoginMessage, "Error de conexión con el servidor.", "error");
      }
    }

    async function guardarReceta() {
      limpiarMensaje(adminFormMessage);

      const token = getAdminToken();
      if (!token) {
        mostrarMensaje(adminFormMessage, "Sesión expirada. Vuelve a iniciar sesión.", "error");
        prepararEstadoAdmin();
        return;
      }

      const payload = {
        nombre: recipeNombre.value.trim(),
        descripcion: recipeDescripcion.value.trim(),
        categoria: recipeCategoria.value.trim(),
        ingredientes: recipeIngredientes.value.trim(),
        pasos: recipePasos.value.trim(),
        fecha: recipeFecha.value,
        link: recipeLink.value.trim(),
        imagen: recipeImagen.value.trim(),
        visible: recipeVisible.checked
      };

      if (!payload.nombre) {
        mostrarMensaje(adminFormMessage, "El nombre es obligatorio.", "error");
        return;
      }

      try {
        const response = await fetch(getCreateRecipeUrl(), {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          mostrarMensaje(
            adminFormMessage,
            data.error || "No se pudo guardar la receta.",
            "error"
          );
          return;
        }

        mostrarMensaje(adminFormMessage, "Receta creada correctamente.", "success");
        limpiarFormularioReceta();
        await cargarRecetasEnSegundoPlano();
      } catch (error) {
        console.error(error);
        mostrarMensaje(adminFormMessage, "Error al guardar la receta.", "error");
      }
    }

    function limpiarFormularioReceta() {
      recipeNombre.value = "";
      recipeDescripcion.value = "";
      recipeCategoria.value = "";
      recipeIngredientes.value = "";
      recipePasos.value = "";
      recipeFecha.value = "";
      recipeLink.value = "";
      recipeImagen.value = "";
      recipeVisible.checked = true;
    }

    async function cargarRecetasEnSegundoPlano() {
      try {
        const response = await fetch(API_BASE);
        if (!response.ok) return;
        console.log("GET recetas URL:", getRecipesUrl());
        console.log("GET recetas status:", response.status);
        recetas = await response.json();
        renderCategorias();
        aplicarFiltros();
      } catch (error) {
        console.error(error);
      }
    }

    function logoutAdmin() {
      clearAdminToken();

      adminUsername.value = "";
      adminPassword.value = "";
      
      limpiarFormularioReceta();
      limpiarMensaje(adminLoginMessage);
      limpiarMensaje(adminFormMessage);
      prepararEstadoAdmin();
    }

    searchToggle.addEventListener("click", toggleBuscador);
    searchClose.addEventListener("click", () => {
      if (searchInput.value.trim()) cerrarBuscador(true);
      else cerrarBuscador(false);
    });
    searchInput.addEventListener("input", aplicarFiltros);

    menuToggle.addEventListener("click", abrirDrawer);
    drawerClose.addEventListener("click", cerrarDrawer);
    drawerOverlay.addEventListener("click", cerrarDrawer);

    document.getElementById("menuHome").addEventListener("click", () => {
      mostrarInicio(true);
    });

    document.getElementById("menuAdmin").addEventListener("click", () => {
      cerrarDrawer();
      mostrarAdmin(true);
    });

    adminLoginButton.addEventListener("click", loginAdmin);
    adminBackButton1.addEventListener("click", () => {
      history.back();
    });

    adminBackButton2.addEventListener("click", () => {
      history.back();
    });
    logoutAdminButton.addEventListener("click", logoutAdmin);
    saveRecipeButton.addEventListener("click", guardarReceta);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then((registration) => {
            console.log("SW registrado", registration.scope);
          })
          .catch((err) => {
            console.log("Error SW", err);
          });
      });
    }

    cargarRecetas();
    
    
    
  </script>
</body>
</html>
